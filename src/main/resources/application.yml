spring:
  application:
    name: task-time-tracker-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_tracker}}
    username: ${DB_USER:task_user}
    password: ${DB_PASSWORD:task_password}
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.cdek.timetracker.model

security:
  jwt:
    secret: ${JWT_SECRET:TjXU+N1Dadpod09PQWEyzDYlVTVZgeA4K5tA+Yd2X9LnoYMVlJnTfsTKtcSnP9gJ}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
